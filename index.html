<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Gato 🎀</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital@1&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink-dark: #c4527a; --pink-mid: #e891b2;
      --glass-border: rgba(255,200,225,0.5);
      --text-dark: #3a1a2e; --text-mid: #7a3a5a;
    }
    body {
      min-height: 100vh; background: #ffffff;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .bows-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bow { position: absolute; opacity: 0; animation: floatBow linear infinite; }
    .bow img { width: 100%; height: 100%; object-fit: contain; }
    @keyframes floatBow {
      0%   { transform: translateY(110vh) rotate(-6deg); opacity: 0; }
      6%   { opacity: 0.7; }
      88%  { opacity: 0.6; }
      100% { transform: translateY(-18vh) rotate(6deg); opacity: 0; }
    }
    .card {
      position: relative; z-index: 10; width: min(92vw, 400px);
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 28px; padding: 28px 24px 24px;
      backdrop-filter: blur(9px) saturate(150%);
      -webkit-backdrop-filter: blur(9px) saturate(150%);
      box-shadow: 0 8px 32px rgba(200,100,150,0.15), inset 0 1px 0 rgba(255,255,255,0.8), inset 0 -1px 0 rgba(255,180,210,0.2);
    }
    .card::before {
      content: ''; position: absolute; inset: 0; border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,0.45) 0%, transparent 60%);
      pointer-events: none;
    }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.6rem; color: var(--pink-dark); }
    .scoreboard { display: flex; gap: 8px; }
    .score-pill {
      background: rgba(255,255,255,0.6); border: 1px solid var(--glass-border);
      border-radius: 50px; padding: 4px 12px; font-size: 0.8rem; font-weight: 500; color: var(--text-dark);
      transition: background 0.3s, transform 0.3s;
    }
    .score-pill.bump { background: rgba(196,82,122,0.25); transform: scale(1.15); }
    .room-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .glass-input {
      flex: 1; background: rgba(255,255,255,0.5); border: 1.5px solid var(--glass-border);
      border-radius: 50px; padding: 8px 14px; font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif; color: var(--text-dark); outline: none;
      transition: border-color 0.2s, background 0.2s; min-width: 0;
    }
    .glass-input::placeholder { color: var(--pink-mid); }
    .glass-input:focus { border-color: var(--pink-dark); background: rgba(255,255,255,0.75); }
    .glass-btn {
      background: rgba(196,82,122,0.85); border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50px; padding: 8px 16px; font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif; font-weight: 500; color: #fff;
      cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
    }
    .glass-btn:hover { background: rgba(196,82,122,1); }
    .glass-btn:active { transform: scale(0.96); }
    .glass-btn.secondary { background: rgba(255,255,255,0.5); color: var(--text-dark); border-color: var(--glass-border); }
    .glass-btn.secondary:hover { background: rgba(255,255,255,0.8); }
    .status-text { font-size: 0.8rem; color: var(--text-mid); margin-bottom: 14px; min-height: 1.2em; }

    /* Tablero con lineas de grilla dibujadas a mano */
    .board-wrap { position: relative; margin-bottom: 16px; }
    .grid-lines {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 6; overflow: visible;
    }
    .grid-lines path {
      stroke: var(--pink-mid); stroke-width: 2.4; fill: none;
      stroke-linecap: round; opacity: 0.9;
      filter: drop-shadow(0 1px 2px rgba(255,255,255,0.7));
    }
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .cell {
      aspect-ratio: 1; background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; cursor: pointer; backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      user-select: none; color: var(--pink-dark);
      font-weight: 600; text-shadow: 0 1px 3px rgba(255,255,255,0.9);
    }
    .cell:hover:not(.taken) { background: rgba(255,255,255,0.4); border-color: var(--pink-mid); transform: scale(1.03); }
    .cell.taken { cursor: default; }
    .cell.win { background: rgba(196,82,122,0.18); border-color: var(--pink-dark); animation: winPulse 0.5s ease; }
    @keyframes winPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    .footer-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .turn-label { font-size: 0.82rem; color: var(--text-mid); flex: 1; }
    .overlay {
      position: fixed; inset: 0; background: rgba(255,240,247,0.4);
      backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: rgba(255,245,250,0.95); border: 1.5px solid var(--glass-border);
      border-radius: 24px; padding: 32px 28px; text-align: center;
      backdrop-filter: blur(24px);
      box-shadow: 0 16px 48px rgba(196,82,122,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      transform: scale(0.9); transition: transform 0.3s;
    }
    .overlay.show .modal { transform: scale(1); }
    .modal-emoji { font-size: 3rem; margin-bottom: 8px; }
    .modal-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.4rem; color: var(--pink-dark); margin-bottom: 6px; }
    .modal-sub { font-size: 0.8rem; color: var(--text-mid); margin-bottom: 16px; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
  </style>
</head>
<body>

<div class="bows-layer" id="bowsLayer"></div>

<div class="card">
  <div class="header">
    <span class="title">gato 🎀</span>
    <div class="scoreboard">
      <span class="score-pill" id="scoreX">X: 0</span>
      <span class="score-pill" id="scoreO">O: 0</span>
    </div>
  </div>
  <div class="room-row">
    <input class="glass-input" id="nameInput" placeholder="Tu nombre" maxlength="12" />
    <input class="glass-input" id="roomInput" placeholder="Código de sala" maxlength="8" />
    <button class="glass-btn" id="joinBtn">Unirse</button>
  </div>
  <p class="status-text" id="statusText">Sin sala</p>

  <div class="board-wrap">
    <svg class="grid-lines" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M33.3 5 Q31.8 50 33.3 95" />
      <path d="M66.6 5 Q68.1 50 66.6 95" />
      <path d="M5 33.3 Q50 31.8 95 33.3" />
      <path d="M5 66.6 Q50 68.1 95 66.6" />
    </svg>
    <div class="board" id="board"></div>
  </div>

  <div class="footer-row">
    <span class="turn-label" id="turnLabel">Turno de X</span>
    <button class="glass-btn secondary" id="restartBtn">Reiniciar</button>
    <button class="glass-btn secondary" id="newGameBtn">Nueva partida</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-emoji" id="modalEmoji">🎀</div>
    <div class="modal-title" id="modalTitle">¡Ganaste!</div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-btns">
      <button class="glass-btn secondary" id="modalRestart">Reiniciar</button>
      <button class="glass-btn" id="modalNew">Nueva partida</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }                               from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDppvzV2M4jM-PXaCCAsY6o8IXDKn8O9FQ",
    authDomain: "gato-3daae.firebaseapp.com",
    databaseURL: "https://gato-3daae-default-rtdb.firebaseio.com",
    projectId: "gato-3daae",
    storageBucket: "gato-3daae.firebasestorage.app",
    messagingSenderId: "575084341853",
    appId: "1:575084341853:web:a4830d89515a031289fbb4"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const WINS  = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const EMPTY = '---------';

  let roomId = null, mySymbol = null, myName = '';
  let prevScoreX = 0, prevScoreO = 0;

  const boardEl    = document.getElementById('board');
  const statusEl   = document.getElementById('statusText');
  const turnEl     = document.getElementById('turnLabel');
  const scoreXEl   = document.getElementById('scoreX');
  const scoreOEl   = document.getElementById('scoreO');
  const overlay    = document.getElementById('overlay');
  const modalEmoji = document.getElementById('modalEmoji');
  const modalTitle = document.getElementById('modalTitle');
  const modalSub   = document.getElementById('modalSub');

  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.i = i;
    cell.addEventListener('click', () => handleClick(i));
    boardEl.appendChild(cell);
  }

  function checkWinner(b) {
    for (const combo of WINS) {
      const [a,c,d] = combo;
      if (b[a] !== '-' && b[a] === b[c] && b[c] === b[d]) return b[a];
    }
    return null;
  }

  function normalizeBoard(raw) {
    if (typeof raw === 'string' && raw.length === 9) return raw;
    if (Array.isArray(raw)) {
      let s = '';
      for (let i = 0; i < 9; i++) s += (raw[i] === 'X' || raw[i] === 'O') ? raw[i] : '-';
      return s;
    }
    if (raw && typeof raw === 'object') {
      let s = '';
      for (let i = 0; i < 9; i++) { const v = raw[i]; s += (v === 'X' || v === 'O') ? v : '-'; }
      return s;
    }
    return EMPTY;
  }

  document.getElementById('joinBtn').onclick = async () => {
    const name = document.getElementById('nameInput').value.trim();
    const room = document.getElementById('roomInput').value.trim().toUpperCase();
    if (!name || !room) { statusEl.textContent = 'Completá tu nombre y el código de sala.'; return; }
    myName = name;
    roomId = room;

    const snap = await get(ref(db, 'rooms/' + roomId));
    const data = snap.val();

    if (!data) {
      mySymbol = 'X';
      await set(ref(db, 'rooms/' + roomId), {
        board: EMPTY, turn: 'X', status: 'waiting',
        nextStarter: 'X', winner: 'none',
        nameX: myName, nameO: '',
        scoreX: 0, scoreO: 0
      });
      statusEl.textContent = 'Sala ' + roomId + ' creada. Esperando rival\u2026';
    } else if (data.nameX === myName) {
      mySymbol = 'X';
    } else if (data.nameO === myName) {
      mySymbol = 'O';
    } else if (!data.nameO) {
      mySymbol = 'O';
      await update(ref(db, 'rooms/' + roomId), { nameO: myName, status: 'playing' });
    } else {
      statusEl.textContent = 'Sala llena.';
      return;
    }

    onValue(ref(db, 'rooms/' + roomId), snap => renderGame(snap.val()));
  };

  function renderGame(data) {
    if (!data) return;
    const board  = normalizeBoard(data.board);
    const turn   = data.turn || 'X';
    const nameX  = data.nameX || 'X';
    const nameO  = data.nameO || 'O';
    const scoreX = Number(data.scoreX) || 0;
    const scoreO = Number(data.scoreO) || 0;
    const status = data.status || 'playing';
    const winner = (data.winner && data.winner !== 'none') ? data.winner : null;
    const nextStarter = data.nextStarter || 'X';

    scoreXEl.textContent = nameX + ': ' + scoreX;
    scoreOEl.textContent = nameO + ': ' + scoreO;
    if (scoreX !== prevScoreX) { scoreXEl.classList.add('bump'); setTimeout(()=>scoreXEl.classList.remove('bump'),400); prevScoreX = scoreX; }
    if (scoreO !== prevScoreO) { scoreOEl.classList.add('bump'); setTimeout(()=>scoreOEl.classList.remove('bump'),400); prevScoreO = scoreO; }

    if (status === 'waiting') statusEl.textContent = 'Sala ' + roomId + ' \u2014 esperando rival\u2026';
    else if (mySymbol)        statusEl.textContent = 'Sala ' + roomId + ' \u2014 jug\u00e1s como ' + mySymbol;

    const winLine = winner ? (WINS.find(c => board[c[0]]!=='-' && board[c[0]]===board[c[1]] && board[c[1]]===board[c[2]]) || []) : [];

    const cells = boardEl.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      cell.textContent = board[i] === 'X' ? '\u2715' : board[i] === 'O' ? '\u25cb' : '';
      cell.classList.toggle('taken', board[i] !== '-');
      cell.classList.toggle('win', winLine.includes(i));
    });

    if (status === 'won') {
      const winnerName = winner === 'X' ? nameX : nameO;
      const isMine     = winner === mySymbol;
      const nextName   = nextStarter === 'X' ? nameX : nameO;
      showModal(
        isMine ? '\uD83C\uDF80' : '\uD83D\uDC94',
        isMine ? '\u00a1Ganaste, ' + myName + '!' : 'Gan\u00f3 ' + winnerName,
        'Empieza la siguiente: ' + nextName + ' (' + nextStarter + ')'
      );
      turnEl.textContent = '';
    } else if (status === 'draw') {
      const nextName = nextStarter === 'X' ? nameX : nameO;
      showModal('\uD83E\uDD1D', '\u00a1Empate!', 'Empieza la siguiente: ' + nextName + ' (' + nextStarter + ')');
      turnEl.textContent = '';
    } else {
      overlay.classList.remove('show');
      const isMyTurn = turn === mySymbol;
      turnEl.textContent = isMyTurn ? 'Tu turno \u2728' : 'Turno de ' + (turn === 'X' ? nameX : nameO);
    }
  }

  async function handleClick(i) {
    if (!roomId || !mySymbol) return;
    const snap = await get(ref(db, 'rooms/' + roomId));
    const data = snap.val();
    if (!data) return;

    const board  = normalizeBoard(data.board);
    const status = data.status || 'playing';

    if (!data.nameX || !data.nameO) return;
    if (status === 'won' || status === 'draw') return;
    if (status === 'waiting') return;
    if (data.turn !== mySymbol) return;
    if (board[i] !== '-') return;

    const arr = board.split('');
    arr[i] = mySymbol;
    const newBoard = arr.join('');

    const winner = checkWinner(newBoard);
    const draw   = !winner && !newBoard.includes('-');

    let scoreX = Number(data.scoreX) || 0;
    let scoreO = Number(data.scoreO) || 0;
    if (winner === 'X') scoreX++;
    if (winner === 'O') scoreO++;

    let nextStarter;
    if (winner === 'X')      nextStarter = 'O';
    else if (winner === 'O') nextStarter = 'X';
    else                     nextStarter = data.turn === 'X' ? 'O' : 'X';

    await update(ref(db, 'rooms/' + roomId), {
      board: newBoard,
      turn: mySymbol === 'X' ? 'O' : 'X',
      status: winner ? 'won' : draw ? 'draw' : 'playing',
      winner: winner || 'none',
      nextStarter: nextStarter,
      scoreX: scoreX,
      scoreO: scoreO
    });
  }

  async function restartBoard() {
    if (!roomId) return;
    overlay.classList.remove('show');
    const snap = await get(ref(db, 'rooms/' + roomId));
    const data = snap.val();
    const starter = (data && data.nextStarter) ? data.nextStarter : 'X';
    await update(ref(db, 'rooms/' + roomId), {
      board: EMPTY, turn: starter, status: 'playing',
      winner: 'none', nextStarter: starter
    });
  }

  async function newGame() {
    if (!roomId) return;
    overlay.classList.remove('show');
    prevScoreX = 0; prevScoreO = 0;
    await update(ref(db, 'rooms/' + roomId), {
      board: EMPTY, turn: 'X', status: 'playing',
      winner: 'none', nextStarter: 'X', scoreX: 0, scoreO: 0
    });
  }

  document.getElementById('restartBtn').onclick  = restartBoard;
  document.getElementById('newGameBtn').onclick   = newGame;
  document.getElementById('modalRestart').onclick = restartBoard;
  document.getElementById('modalNew').onclick     = newGame;

  function showModal(emoji, title, sub) {
    modalEmoji.textContent = emoji;
    modalTitle.textContent = title;
    modalSub.textContent   = sub || '';
    overlay.classList.add('show');
  }

  // Lazos flotantes
  const layer = document.getElementById('bowsLayer');
  for (let i = 0; i < 18; i++) {
    const div   = document.createElement('div');
    div.className = 'bow';
    const size  = 60 + Math.random() * 80;
    const left  = Math.random() * 100;
    const dur   = 11 + Math.random() * 14;
    const delay = -(Math.random() * dur);
    const rot   = (Math.random() - 0.5) * 30;
    div.style.cssText = 'left:' + left + '%;width:' + size + 'px;height:' + size + 'px;animation-duration:' + dur + 's;animation-delay:' + delay + 's;';
    const img = document.createElement('img');
    img.src = 'mono.png';
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;transform:rotate(' + rot + 'deg);';
    div.appendChild(img);
    layer.appendChild(div);
  }
</script>
</body>
</html>
