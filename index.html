<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gato 🎀</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital@1&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-light: #f9c8d9;
      --pink-mid: #e891b2;
      --pink-dark: #c4527a;
      --glass-bg: rgba(255, 240, 247, 0.18);
      --glass-border: rgba(255, 200, 225, 0.45);
      --glass-shadow: rgba(200, 100, 150, 0.15);
      --text-dark: #3a1a2e;
      --text-mid: #7a3a5a;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #fce4ec 60%, #fff0f5 100%);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Lazos flotantes ── */
    .bows-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bow {
      position: absolute;
      opacity: 0;
      animation: floatBow linear infinite;
    }

    .bow svg { width: 100%; height: 100%; }

    @keyframes floatBow {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      5%   { opacity: 0.55; }
      90%  { opacity: 0.45; }
      100% { transform: translateY(-20vh) rotate(25deg);  opacity: 0; }
    }

    /* ── Card liquid-glass ── */
    .card {
      position: relative;
      z-index: 10;
      width: min(92vw, 400px);
      background: var(--glass-bg);
      border: 1.5px solid var(--glass-border);
      border-radius: 28px;
      padding: 28px 24px 24px;
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      box-shadow:
        0 8px 32px var(--glass-shadow),
        inset 0 1px 0 rgba(255,255,255,0.6),
        inset 0 -1px 0 rgba(255,180,210,0.2);
    }

    /* inner shimmer */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,0.35) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.6rem;
      color: var(--pink-dark);
      letter-spacing: 0.02em;
    }

    .scoreboard {
      display: flex;
      gap: 8px;
    }

    .score-pill {
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-dark);
      backdrop-filter: blur(8px);
    }

    /* ── Inputs sala ── */
    .room-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .glass-input {
      flex: 1;
      background: rgba(255,255,255,0.45);
      border: 1.5px solid var(--glass-border);
      border-radius: 50px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dark);
      outline: none;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, background 0.2s;
    }
    .glass-input::placeholder { color: var(--pink-mid); }
    .glass-input:focus {
      border-color: var(--pink-dark);
      background: rgba(255,255,255,0.65);
    }

    .glass-btn {
      background: rgba(196, 82, 122, 0.82);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .glass-btn:hover  { background: rgba(196, 82, 122, 1); }
    .glass-btn:active { transform: scale(0.96); }

    .glass-btn.secondary {
      background: rgba(255,255,255,0.45);
      color: var(--text-dark);
      border-color: var(--glass-border);
    }
    .glass-btn.secondary:hover { background: rgba(255,255,255,0.7); }

    /* ── Status ── */
    .status-text {
      font-size: 0.8rem;
      color: var(--text-mid);
      margin-bottom: 14px;
      min-height: 1.2em;
    }

    /* ── Tablero ── */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .cell {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.38);
      border: 1.5px solid var(--glass-border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
      user-select: none;
    }
    .cell:hover:not(.taken) {
      background: rgba(255,255,255,0.6);
      border-color: var(--pink-mid);
      transform: scale(1.04);
    }
    .cell.taken { cursor: default; }
    .cell.win {
      background: rgba(196, 82, 122, 0.18);
      border-color: var(--pink-dark);
      animation: winPulse 0.5s ease;
    }
    @keyframes winPulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }

    /* ── Footer botones ── */
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .turn-label {
      font-size: 0.82rem;
      color: var(--text-mid);
      flex: 1;
    }

    /* ── Modal resultado ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(252, 228, 236, 0.45);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: rgba(255,240,247,0.75);
      border: 1.5px solid var(--glass-border);
      border-radius: 24px;
      padding: 32px 28px;
      text-align: center;
      backdrop-filter: blur(24px);
      box-shadow: 0 16px 48px rgba(196,82,122,0.2), inset 0 1px 0 rgba(255,255,255,0.7);
      transform: scale(0.9);
      transition: transform 0.3s;
    }
    .overlay.show .modal { transform: scale(1); }

    .modal-emoji { font-size: 3rem; margin-bottom: 8px; }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--pink-dark);
      margin-bottom: 16px;
    }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
  </style>
</head>
<body>

<!-- Lazos flotantes -->
<div class="bows-layer" id="bowsLayer"></div>

<!-- Card principal -->
<div class="card">
  <div class="header">
    <span class="title">gato 🎀</span>
    <div class="scoreboard">
      <span class="score-pill" id="scoreX">X: 0</span>
      <span class="score-pill" id="scoreO">O: 0</span>
    </div>
  </div>

  <div class="room-row">
    <input class="glass-input" id="nameInput"  placeholder="Tu nombre" maxlength="12" />
    <input class="glass-input" id="roomInput"  placeholder="Código de sala" maxlength="8" />
    <button class="glass-btn" id="joinBtn">Unirse</button>
  </div>

  <p class="status-text" id="statusText">Sin sala</p>

  <div class="board" id="board">
    <!-- 9 celdas -->
  </div>

  <div class="footer-row">
    <span class="turn-label" id="turnLabel">Turno de X</span>
    <button class="glass-btn secondary" id="restartBtn">Reiniciar</button>
    <button class="glass-btn secondary" id="newGameBtn">Partida nueva</button>
  </div>
</div>

<!-- Modal resultado -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-emoji" id="modalEmoji">🎀</div>
    <div class="modal-title" id="modalTitle">¡Ganaste!</div>
    <div class="modal-btns">
      <button class="glass-btn secondary" id="modalRestart">Reiniciar</button>
      <button class="glass-btn" id="modalNew">Nueva partida</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp }                            from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update }  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

  // ── Config ──────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDppvzV2M4jM-PXaCCAsY6o8IXDKn8O9FQ",
    authDomain: "gato-3daae.firebaseapp.com",
    databaseURL: "https://gato-3daae-default-rtdb.firebaseio.com",
    projectId: "gato-3daae",
    storageBucket: "gato-3daae.firebasestorage.app",
    messagingSenderId: "575084341853",
    appId: "1:575084341853:web:a4830d89515a031289fbb4"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── Estado local ────────────────────────────────────
  let roomId   = null;
  let mySymbol = null;   // 'X' | 'O'
  let myName   = '';
  let scores   = { X: 0, O: 0 };

  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  // ── DOM ─────────────────────────────────────────────
  const boardEl    = document.getElementById('board');
  const statusEl   = document.getElementById('statusText');
  const turnEl     = document.getElementById('turnLabel');
  const scoreXEl   = document.getElementById('scoreX');
  const scoreOEl   = document.getElementById('scoreO');
  const overlay    = document.getElementById('overlay');
  const modalEmoji = document.getElementById('modalEmoji');
  const modalTitle = document.getElementById('modalTitle');

  // ── Construir tablero ───────────────────────────────
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.i = i;
    cell.addEventListener('click', () => handleClick(i));
    boardEl.appendChild(cell);
  }
  const cells = () => [...boardEl.querySelectorAll('.cell')];

  // ── Unirse a sala ───────────────────────────────────
  document.getElementById('joinBtn').onclick = async () => {
    const name = document.getElementById('nameInput').value.trim();
    const room = document.getElementById('roomInput').value.trim().toUpperCase();
    if (!name || !room) { statusEl.textContent = 'Completá tu nombre y el código de sala.'; return; }

    myName = name;
    roomId = room;
    const roomRef = ref(db, `rooms/${roomId}`);

    // Leer sala actual
    onValue(roomRef, snap => {
      const data = snap.val();
      if (!data) {
        // Crear sala como X
        mySymbol = 'X';
        set(roomRef, {
          board: Array(9).fill(''),
          turn: 'X',
          status: 'waiting',
          players: { X: myName },
          scores: { X: 0, O: 0 }
        });
        statusEl.textContent = `Sala ${roomId} creada. Esperando a tu rival…`;
      } else {
        // Unirse como O si hay lugar
        if (!mySymbol) {
          if (data.players?.O) {
            // Sala llena, solo espectador
            mySymbol = data.players.X === myName ? 'X' : null;
          } else {
            mySymbol = 'O';
            update(ref(db, `rooms/${roomId}/players`), { O: myName });
          }
        }
        renderGame(data);
      }
    }, { onlyOnce: false });
  };

  // ── Renderizar estado ────────────────────────────────
  function renderGame(data) {
    if (!data) return;

    const board   = data.board   || Array(9).fill('');
    const turn    = data.turn    || 'X';
    const status  = data.status  || 'playing';
    const players = data.players || {};
    scores        = data.scores  || { X: 0, O: 0 };

    scoreXEl.textContent = `${players.X || 'X'}: ${scores.X}`;
    scoreOEl.textContent = `${players.O || 'O'}: ${scores.O}`;

    if (status === 'waiting' && !players.O) {
      statusEl.textContent = `Sala ${roomId} — esperando oponente…`;
    } else if (mySymbol) {
      statusEl.textContent = `Sala ${roomId} — jugás como ${mySymbol}`;
    }

    // Detectar ganador para resaltar
    let winCells = [];
    for (const combo of WINS) {
      if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[1]] === board[combo[2]]) {
        winCells = combo;
        break;
      }
    }

    cells().forEach((cell, i) => {
      cell.textContent = board[i] === 'X' ? '✕' : board[i] === 'O' ? '○' : '';
      cell.classList.toggle('taken', !!board[i]);
      cell.classList.toggle('win', winCells.includes(i));
    });

    if (status === 'won') {
      const winner = data.winner;
      const winName = players[winner] || winner;
      const isMine  = winner === mySymbol;
      showModal(isMine ? '🎀' : '💔', isMine ? `¡Ganaste, ${myName}!` : `Ganó ${winName}`);
      turnEl.textContent = '';
    } else if (status === 'draw') {
      showModal('🤝', '¡Empate!');
      turnEl.textContent = '';
    } else {
      overlay.classList.remove('show');
      const isMyTurn = turn === mySymbol;
      turnEl.textContent = isMyTurn ? 'Tu turno ✨' : `Turno de ${players[turn] || turn}`;
    }
  }

  // ── Click en celda ───────────────────────────────────
  async function handleClick(i) {
    if (!roomId || !mySymbol) return;

    const snap = await new Promise(res => onValue(ref(db, `rooms/${roomId}`), res, { onlyOnce: true }));
    const data = snap.val();
    if (!data) return;

    const board = data.board || Array(9).fill('');
    const turn  = data.turn  || 'X';

    if (data.status !== 'playing' && data.status !== 'waiting') return;
    if (data.status === 'waiting' && !data.players?.O) return;
    if (turn !== mySymbol) return;
    if (board[i]) return;

    board[i] = mySymbol;
    const nextTurn = mySymbol === 'X' ? 'O' : 'X';

    // Revisar ganador
    let winner = null;
    for (const combo of WINS) {
      if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[1]] === board[combo[2]]) {
        winner = board[combo[0]]; break;
      }
    }
    const draw = !winner && board.every(c => c);

    const newScores = { ...scores };
    if (winner) newScores[winner] = (newScores[winner] || 0) + 1;

    await update(ref(db, `rooms/${roomId}`), {
      board,
      turn: nextTurn,
      status: winner ? 'won' : draw ? 'draw' : 'playing',
      winner: winner || null,
      scores: newScores
    });
  }

  // ── Reiniciar tablero ────────────────────────────────
  async function restartBoard() {
    if (!roomId) return;
    overlay.classList.remove('show');
    await update(ref(db, `rooms/${roomId}`), {
      board: Array(9).fill(''),
      turn: 'X',
      status: 'playing',
      winner: null
    });
  }

  // ── Partida nueva (resetea puntaje) ──────────────────
  async function newGame() {
    if (!roomId) return;
    overlay.classList.remove('show');
    await update(ref(db, `rooms/${roomId}`), {
      board: Array(9).fill(''),
      turn: 'X',
      status: 'playing',
      winner: null,
      scores: { X: 0, O: 0 }
    });
  }

  document.getElementById('restartBtn').onclick = restartBoard;
  document.getElementById('newGameBtn').onclick  = newGame;
  document.getElementById('modalRestart').onclick = restartBoard;
  document.getElementById('modalNew').onclick     = newGame;

  // ── Modal ────────────────────────────────────────────
  function showModal(emoji, title) {
    modalEmoji.textContent = emoji;
    modalTitle.textContent = title;
    overlay.classList.add('show');
  }

  // ── Lazos flotantes ──────────────────────────────────
  const layer = document.getElementById('bowsLayer');
  const BOW_SVG = (color, size) => `
    <svg viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size*0.625}">
      <ellipse cx="22" cy="25" rx="20" ry="13" fill="${color}" opacity="0.85"/>
      <ellipse cx="58" cy="25" rx="20" ry="13" fill="${color}" opacity="0.85"/>
      <ellipse cx="22" cy="25" rx="12" ry="8"  fill="${color}" opacity="0.5"/>
      <ellipse cx="58" cy="25" rx="12" ry="8"  fill="${color}" opacity="0.5"/>
      <ellipse cx="40" cy="25" rx="7"  ry="7"  fill="${color}"/>
      <path d="M40 25 Q50 35 60 45" stroke="${color}" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M40 25 Q30 35 20 45" stroke="${color}" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>`;

  const colors = ['#f48fb1','#f06292','#e91e8c','#fce4ec','#f8bbd0','#d81b60'];

  for (let i = 0; i < 18; i++) {
    const div  = document.createElement('div');
    div.className = 'bow';
    const size  = 40 + Math.random() * 70;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left  = Math.random() * 100;
    const dur   = 10 + Math.random() * 16;
    const delay = -(Math.random() * dur);

    div.style.cssText = `
      left: ${left}%;
      width: ${size}px;
      height: ${size * 0.625}px;
      animation-duration: ${dur}s;
      animation-delay: ${delay}s;
    `;
    div.innerHTML = BOW_SVG(color, size);
    layer.appendChild(div);
  }
</script>
</body>
</html>
