<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gato 🎀</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital@1&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink-dark: #c4527a; --pink-mid: #e891b2;
      --glass-border: rgba(255,200,225,0.5);
      --text-dark: #3a1a2e; --text-mid: #7a3a5a;
    }
    body {
      min-height: 100vh; background: #ffffff;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .bows-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bow { position: absolute; opacity: 0; animation: floatBow linear infinite; }
    .bow img { width: 100%; height: 100%; object-fit: contain; }
    @keyframes floatBow {
      0%   { transform: translateY(110vh) rotate(-6deg); opacity: 0; }
      6%   { opacity: 0.7; }
      88%  { opacity: 0.6; }
      100% { transform: translateY(-18vh) rotate(6deg); opacity: 0; }
    }
    .card {
      position: relative; z-index: 10; width: min(92vw, 400px);
      background: rgba(255,240,247,0.22); border: 1.5px solid var(--glass-border);
      border-radius: 28px; padding: 28px 24px 24px;
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 0 8px 32px rgba(200,100,150,0.12), inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .card::before {
      content: ''; position: absolute; inset: 0; border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,0.45) 0%, transparent 60%);
      pointer-events: none;
    }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.6rem; color: var(--pink-dark); }
    .scoreboard { display: flex; gap: 8px; }
    .score-pill {
      background: rgba(255,255,255,0.6); border: 1px solid var(--glass-border);
      border-radius: 50px; padding: 4px 12px; font-size: 0.8rem; font-weight: 500; color: var(--text-dark);
    }
    .room-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .glass-input {
      flex: 1; background: rgba(255,255,255,0.5); border: 1.5px solid var(--glass-border);
      border-radius: 50px; padding: 8px 14px; font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif; color: var(--text-dark); outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .glass-input::placeholder { color: var(--pink-mid); }
    .glass-input:focus { border-color: var(--pink-dark); background: rgba(255,255,255,0.75); }
    .glass-btn {
      background: rgba(196,82,122,0.85); border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50px; padding: 8px 16px; font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif; font-weight: 500; color: #fff;
      cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
    }
    .glass-btn:hover { background: rgba(196,82,122,1); }
    .glass-btn:active { transform: scale(0.96); }
    .glass-btn.secondary { background: rgba(255,255,255,0.5); color: var(--text-dark); border-color: var(--glass-border); }
    .glass-btn.secondary:hover { background: rgba(255,255,255,0.8); }
    .status-text { font-size: 0.8rem; color: var(--text-mid); margin-bottom: 14px; min-height: 1.2em; }
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .cell {
      aspect-ratio: 1; background: rgba(255,255,255,0.42); border: 1.5px solid var(--glass-border);
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; cursor: pointer; backdrop-filter: blur(10px);
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6); user-select: none;
    }
    .cell:hover:not(.taken) { background: rgba(255,255,255,0.7); border-color: var(--pink-mid); transform: scale(1.04); }
    .cell.taken { cursor: default; }
    .cell.win { background: rgba(196,82,122,0.15); border-color: var(--pink-dark); animation: winPulse 0.5s ease; }
    @keyframes winPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    .footer-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .turn-label { font-size: 0.82rem; color: var(--text-mid); flex: 1; }
    .overlay {
      position: fixed; inset: 0; background: rgba(255,240,247,0.4);
      backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: rgba(255,245,250,0.9); border: 1.5px solid var(--glass-border);
      border-radius: 24px; padding: 32px 28px; text-align: center;
      backdrop-filter: blur(24px);
      box-shadow: 0 16px 48px rgba(196,82,122,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      transform: scale(0.9); transition: transform 0.3s;
    }
    .overlay.show .modal { transform: scale(1); }
    .modal-emoji { font-size: 3rem; margin-bottom: 8px; }
    .modal-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.4rem; color: var(--pink-dark); margin-bottom: 6px; }
    .modal-sub { font-size: 0.8rem; color: var(--text-mid); margin-bottom: 16px; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
  </style>
</head>
<body>

<div class="bows-layer" id="bowsLayer"></div>

<div class="card">
  <div class="header">
    <span class="title">gato 🎀</span>
    <div class="scoreboard">
      <span class="score-pill" id="scoreX">X: 0</span>
      <span class="score-pill" id="scoreO">O: 0</span>
    </div>
  </div>
  <div class="room-row">
    <input class="glass-input" id="nameInput" placeholder="Tu nombre" maxlength="12" />
    <input class="glass-input" id="roomInput" placeholder="Código de sala" maxlength="8" />
    <button class="glass-btn" id="joinBtn">Unirse</button>
  </div>
  <p class="status-text" id="statusText">Sin sala</p>
  <div class="board" id="board"></div>
  <div class="footer-row">
    <span class="turn-label" id="turnLabel">Turno de X</span>
    <button class="glass-btn secondary" id="restartBtn">Reiniciar</button>
    <button class="glass-btn secondary" id="newGameBtn">Nueva partida</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-emoji" id="modalEmoji">🎀</div>
    <div class="modal-title" id="modalTitle">¡Ganaste!</div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-btns">
      <button class="glass-btn secondary" id="modalRestart">Reiniciar</button>
      <button class="glass-btn" id="modalNew">Nueva partida</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }                           from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDppvzV2M4jM-PXaCCAsY6o8IXDKn8O9FQ",
    authDomain: "gato-3daae.firebaseapp.com",
    databaseURL: "https://gato-3daae-default-rtdb.firebaseio.com",
    projectId: "gato-3daae",
    storageBucket: "gato-3daae.firebasestorage.app",
    messagingSenderId: "575084341853",
    appId: "1:575084341853:web:a4830d89515a031289fbb4"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let roomId   = null;
  let mySymbol = null;
  let myName   = '';

  const boardEl    = document.getElementById('board');
  const statusEl   = document.getElementById('statusText');
  const turnEl     = document.getElementById('turnLabel');
  const scoreXEl   = document.getElementById('scoreX');
  const scoreOEl   = document.getElementById('scoreO');
  const overlay    = document.getElementById('overlay');
  const modalEmoji = document.getElementById('modalEmoji');
  const modalTitle = document.getElementById('modalTitle');
  const modalSub   = document.getElementById('modalSub');

  // Construir tablero
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.i = i;
    cell.addEventListener('click', () => handleClick(i));
    boardEl.appendChild(cell);
  }

  // ── Unirse a sala ────────────────────────────────────────
  document.getElementById('joinBtn').onclick = async () => {
    const name = document.getElementById('nameInput').value.trim();
    const room = document.getElementById('roomInput').value.trim().toUpperCase();
    if (!name || !room) { statusEl.textContent = 'Completá tu nombre y el código de sala.'; return; }
    myName = name;
    roomId = room;

    const snap = await get(ref(db, 'rooms/' + roomId));
    const data = snap.val();

    if (!data) {
      // Sala nueva → soy X
      mySymbol = 'X';
      await set(ref(db, 'rooms/' + roomId), {
        board: ['','','','','','','','',''],
        turn: 'X',
        status: 'waiting',
        nextStarter: 'X',
        players: { X: myName, O: '' },
        scores: { X: 0, O: 0 }
      });
      statusEl.textContent = 'Sala ' + roomId + ' creada. Esperando rival\u2026';
    } else if (data.players && data.players.X === myName) {
      mySymbol = 'X'; // reconectar
    } else if (data.players && data.players.O === myName) {
      mySymbol = 'O'; // reconectar
    } else if (!data.players || !data.players.O) {
      // Unirse como O
      mySymbol = 'O';
      await update(ref(db, 'rooms/' + roomId), {
        'players/O': myName,
        status: 'playing'
      });
    } else {
      statusEl.textContent = 'Sala llena.';
      return;
    }

    // Suscribirse a cambios
    onValue(ref(db, 'rooms/' + roomId), snap => {
      renderGame(snap.val());
    });
  };

  // ── Renderizar ───────────────────────────────────────────
  function renderGame(data) {
    if (!data) return;
    const board   = data.board   || ['','','','','','','','',''];
    const turn    = data.turn    || 'X';
    const players = data.players || {};
    const scores  = data.scores  || { X: 0, O: 0 };

    // Puntaje con nombres reales
    const nameX = players.X || 'X';
    const nameO = players.O || 'O';
    scoreXEl.textContent = nameX + ': ' + scores.X;
    scoreOEl.textContent = nameO + ': ' + scores.O;

    // Status
    if (data.status === 'waiting') {
      statusEl.textContent = 'Sala ' + roomId + ' \u2014 esperando rival\u2026';
    } else if (mySymbol) {
      statusEl.textContent = 'Sala ' + roomId + ' \u2014 jug\u00e1s como ' + mySymbol;
    }

    // Detectar ganador
    let winCells = [];
    for (const combo of WINS) {
      if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[1]] === board[combo[2]]) {
        winCells = combo; break;
      }
    }

    // Pintar celdas
    const cells = boardEl.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      cell.textContent = board[i] === 'X' ? '\u2715' : board[i] === 'O' ? '\u25cb' : '';
      cell.classList.toggle('taken', board[i] !== '');
      cell.classList.toggle('win', winCells.includes(i));
    });

    // Estado del juego
    if (data.status === 'won') {
      const winnerSym  = data.winner;
      const winnerName = winnerSym === 'X' ? nameX : nameO;
      const loserName  = winnerSym === 'X' ? nameO : nameX;
      const isMine     = winnerSym === mySymbol;
      const nextSym    = data.nextStarter || (winnerSym === 'X' ? 'O' : 'X');
      const nextName   = nextSym === 'X' ? nameX : nameO;
      showModal(
        isMine ? '\uD83C\uDF80' : '\uD83D\uDC94',
        isMine ? '\u00a1Ganaste, ' + myName + '!' : 'Gan\u00f3 ' + winnerName,
        'Siguiente ronda empieza: ' + nextName + ' (' + nextSym + ')'
      );
      turnEl.textContent = '';
    } else if (data.status === 'draw') {
      const nextSym  = data.nextStarter || 'X';
      const nextName = nextSym === 'X' ? nameX : nameO;
      showModal('\uD83E\uDD1D', '\u00a1Empate!', 'Siguiente ronda empieza: ' + nextName + ' (' + nextSym + ')');
      turnEl.textContent = '';
    } else {
      overlay.classList.remove('show');
      if (data.status === 'playing' || data.status === 'waiting') {
        const isMyTurn = turn === mySymbol;
        turnEl.textContent = isMyTurn ? 'Tu turno \u2728' : 'Turno de ' + (turn === 'X' ? nameX : nameO);
      }
    }
  }

  // ── Click celda ──────────────────────────────────────────
  async function handleClick(i) {
    if (!roomId || !mySymbol) return;

    const snap = await get(ref(db, 'rooms/' + roomId));
    const data = snap.val();
    if (!data) return;

    const board   = data.board || ['','','','','','','','',''];
    const players = data.players || {};

    // Validaciones
    if (!players.X || !players.O) return;          // falta alguien
    if (data.status === 'won' || data.status === 'draw') return; // ronda terminada
    if (data.status === 'waiting') return;          // todavia esperando
    if (data.turn !== mySymbol) return;             // no es mi turno
    if (board[i] !== '') return;                    // celda ocupada

    // Hacer jugada
    const newBoard = [...board];
    newBoard[i] = mySymbol;

    // Chequear ganador
    let winner = null;
    for (const combo of WINS) {
      if (newBoard[combo[0]] && newBoard[combo[0]] === newBoard[combo[1]] && newBoard[combo[1]] === newBoard[combo[2]]) {
        winner = newBoard[combo[0]]; break;
      }
    }
    const draw = !winner && newBoard.every(c => c !== '');

    // Scores actualizados
    const scores = data.scores || { X: 0, O: 0 };
    const newScores = { X: Number(scores.X) || 0, O: Number(scores.O) || 0 };
    if (winner) newScores[winner]++;

    // REGLA DE TURNO:
    // Si gana X  → la siguiente ronda empieza O (el perdedor)
    // Si gana O  → la siguiente ronda empieza X (el perdedor)
    // Si empate  → alterna (el que NO empezó esta ronda)
    let nextStarter;
    if (winner === 'X')      nextStarter = 'O';
    else if (winner === 'O') nextStarter = 'X';
    else                     nextStarter = data.turn === 'X' ? 'O' : 'X';

    const nextTurn = mySymbol === 'X' ? 'O' : 'X';

    await update(ref(db, 'rooms/' + roomId), {
      board: newBoard,
      turn: nextTurn,
      status: winner ? 'won' : draw ? 'draw' : 'playing',
      winner: winner || null,
      nextStarter: nextStarter,
      scores: newScores
    });
  }

  // ── Reiniciar (conserva puntaje, aplica regla de turno) ──
  async function restartBoard() {
    if (!roomId) return;
    overlay.classList.remove('show');
    const snap = await get(ref(db, 'rooms/' + roomId));
    const data = snap.val();
    // El perdedor empieza (guardado en nextStarter)
    const starter = (data && data.nextStarter) ? data.nextStarter : 'X';
    await update(ref(db, 'rooms/' + roomId), {
      board: ['','','','','','','','',''],
      turn: starter,
      status: 'playing',
      winner: null,
      nextStarter: starter  // se mantiene hasta que termine la ronda
    });
  }

  // ── Nueva partida (resetea todo) ─────────────────────────
  async function newGame() {
    if (!roomId) return;
    overlay.classList.remove('show');
    await update(ref(db, 'rooms/' + roomId), {
      board: ['','','','','','','','',''],
      turn: 'X',
      status: 'playing',
      winner: null,
      nextStarter: 'X',
      scores: { X: 0, O: 0 }
    });
  }

  document.getElementById('restartBtn').onclick  = restartBoard;
  document.getElementById('newGameBtn').onclick   = newGame;
  document.getElementById('modalRestart').onclick = restartBoard;
  document.getElementById('modalNew').onclick     = newGame;

  function showModal(emoji, title, sub) {
    modalEmoji.textContent = emoji;
    modalTitle.textContent = title;
    modalSub.textContent   = sub || '';
    overlay.classList.add('show');
  }

  // ── Lazos flotantes ──────────────────────────────────────
  const layer = document.getElementById('bowsLayer');
  for (let i = 0; i < 18; i++) {
    const div   = document.createElement('div');
    div.className = 'bow';
    const size  = 60 + Math.random() * 80;
    const left  = Math.random() * 100;
    const dur   = 11 + Math.random() * 14;
    const delay = -(Math.random() * dur);
    const rot   = (Math.random() - 0.5) * 30;
    div.style.cssText = 'left:' + left + '%;width:' + size + 'px;height:' + size + 'px;animation-duration:' + dur + 's;animation-delay:' + delay + 's;';
    const img = document.createElement('img');
    img.src = 'mono.png';
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;transform:rotate(' + rot + 'deg);';
    div.appendChild(img);
    layer.appendChild(div);
  }
</script>
</body>
</html>
