<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gato 🎀</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital@1&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-light: #f9c8d9;
      --pink-mid: #e891b2;
      --pink-dark: #c4527a;
      --glass-bg: rgba(255, 240, 247, 0.18);
      --glass-border: rgba(255, 200, 225, 0.45);
      --glass-shadow: rgba(200, 100, 150, 0.15);
      --text-dark: #3a1a2e;
      --text-mid: #7a3a5a;
    }

    body {
      min-height: 100vh;
      background: #ffffff;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Lazos flotantes ── */
    .bows-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bow {
      position: absolute;
      opacity: 0;
      animation: floatBow linear infinite;
    }

    @keyframes floatBow {
      0%   { transform: translateY(110vh) rotate(-8deg);  opacity: 0; }
      6%   { opacity: 0.6; }
      88%  { opacity: 0.5; }
      100% { transform: translateY(-18vh) rotate(8deg);   opacity: 0; }
    }

    /* ── Card liquid-glass ── */
    .card {
      position: relative;
      z-index: 10;
      width: min(92vw, 400px);
      background: rgba(255, 240, 247, 0.22);
      border: 1.5px solid rgba(255, 200, 225, 0.5);
      border-radius: 28px;
      padding: 28px 24px 24px;
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow:
        0 8px 32px rgba(200, 100, 150, 0.12),
        inset 0 1px 0 rgba(255,255,255,0.7),
        inset 0 -1px 0 rgba(255,180,210,0.2);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,0.45) 0%, transparent 60%);
      pointer-events: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.6rem;
      color: var(--pink-dark);
      letter-spacing: 0.02em;
    }

    .scoreboard { display: flex; gap: 8px; }

    .score-pill {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(255, 200, 225, 0.5);
      border-radius: 50px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-dark);
      backdrop-filter: blur(8px);
    }

    .room-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .glass-input {
      flex: 1;
      background: rgba(255,255,255,0.5);
      border: 1.5px solid rgba(255, 200, 225, 0.5);
      border-radius: 50px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dark);
      outline: none;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, background 0.2s;
    }
    .glass-input::placeholder { color: var(--pink-mid); }
    .glass-input:focus {
      border-color: var(--pink-dark);
      background: rgba(255,255,255,0.75);
    }

    .glass-btn {
      background: rgba(196, 82, 122, 0.85);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .glass-btn:hover  { background: rgba(196, 82, 122, 1); }
    .glass-btn:active { transform: scale(0.96); }

    .glass-btn.secondary {
      background: rgba(255,255,255,0.5);
      color: var(--text-dark);
      border-color: rgba(255, 200, 225, 0.5);
    }
    .glass-btn.secondary:hover { background: rgba(255,255,255,0.8); }

    .status-text {
      font-size: 0.8rem;
      color: var(--text-mid);
      margin-bottom: 14px;
      min-height: 1.2em;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .cell {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.42);
      border: 1.5px solid rgba(255, 200, 225, 0.5);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
      user-select: none;
    }
    .cell:hover:not(.taken) {
      background: rgba(255,255,255,0.7);
      border-color: var(--pink-mid);
      transform: scale(1.04);
    }
    .cell.taken { cursor: default; }
    .cell.win {
      background: rgba(196, 82, 122, 0.15);
      border-color: var(--pink-dark);
      animation: winPulse 0.5s ease;
    }
    @keyframes winPulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .turn-label {
      font-size: 0.82rem;
      color: var(--text-mid);
      flex: 1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 240, 247, 0.4);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: rgba(255,245,250,0.8);
      border: 1.5px solid rgba(255, 200, 225, 0.5);
      border-radius: 24px;
      padding: 32px 28px;
      text-align: center;
      backdrop-filter: blur(24px);
      box-shadow: 0 16px 48px rgba(196,82,122,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      transform: scale(0.9);
      transition: transform 0.3s;
    }
    .overlay.show .modal { transform: scale(1); }

    .modal-emoji { font-size: 3rem; margin-bottom: 8px; }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--pink-dark);
      margin-bottom: 16px;
    }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
  </style>
</head>
<body>

<div class="bows-layer" id="bowsLayer"></div>

<div class="card">
  <div class="header">
    <span class="title">gato 🎀</span>
    <div class="scoreboard">
      <span class="score-pill" id="scoreX">X: 0</span>
      <span class="score-pill" id="scoreO">O: 0</span>
    </div>
  </div>

  <div class="room-row">
    <input class="glass-input" id="nameInput"  placeholder="Tu nombre" maxlength="12" />
    <input class="glass-input" id="roomInput"  placeholder="Código de sala" maxlength="8" />
    <button class="glass-btn" id="joinBtn">Unirse</button>
  </div>

  <p class="status-text" id="statusText">Sin sala</p>

  <div class="board" id="board"></div>

  <div class="footer-row">
    <span class="turn-label" id="turnLabel">Turno de X</span>
    <button class="glass-btn secondary" id="restartBtn">Reiniciar</button>
    <button class="glass-btn secondary" id="newGameBtn">Partida nueva</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-emoji" id="modalEmoji">🎀</div>
    <div class="modal-title" id="modalTitle">¡Ganaste!</div>
    <div class="modal-btns">
      <button class="glass-btn secondary" id="modalRestart">Reiniciar</button>
      <button class="glass-btn" id="modalNew">Nueva partida</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }                            from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update }  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDppvzV2M4jM-PXaCCAsY6o8IXDKn8O9FQ",
    authDomain: "gato-3daae.firebaseapp.com",
    databaseURL: "https://gato-3daae-default-rtdb.firebaseio.com",
    projectId: "gato-3daae",
    storageBucket: "gato-3daae.firebasestorage.app",
    messagingSenderId: "575084341853",
    appId: "1:575084341853:web:a4830d89515a031289fbb4"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let roomId = null, mySymbol = null, myName = '', scores = { X: 0, O: 0 };
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  const boardEl    = document.getElementById('board');
  const statusEl   = document.getElementById('statusText');
  const turnEl     = document.getElementById('turnLabel');
  const scoreXEl   = document.getElementById('scoreX');
  const scoreOEl   = document.getElementById('scoreO');
  const overlay    = document.getElementById('overlay');
  const modalEmoji = document.getElementById('modalEmoji');
  const modalTitle = document.getElementById('modalTitle');

  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.i = i;
    cell.addEventListener('click', () => handleClick(i));
    boardEl.appendChild(cell);
  }
  const cells = () => [...boardEl.querySelectorAll('.cell')];

  document.getElementById('joinBtn').onclick = () => {
    const name = document.getElementById('nameInput').value.trim();
    const room = document.getElementById('roomInput').value.trim().toUpperCase();
    if (!name || !room) { statusEl.textContent = 'Completá tu nombre y el código de sala.'; return; }
    myName = name; roomId = room;
    const roomRef = ref(db, `rooms/${roomId}`);
    onValue(roomRef, snap => {
      const data = snap.val();
      if (!data) {
        mySymbol = 'X';
        set(roomRef, { board: Array(9).fill(''), turn: 'X', status: 'waiting', players: { X: myName }, scores: { X: 0, O: 0 } });
        statusEl.textContent = `Sala ${roomId} creada. Esperando a tu rival…`;
      } else {
        if (!mySymbol) {
          if (data.players?.O) { mySymbol = data.players.X === myName ? 'X' : null; }
          else { mySymbol = 'O'; update(ref(db, `rooms/${roomId}/players`), { O: myName }); }
        }
        renderGame(data);
      }
    });
  };

  function renderGame(data) {
    if (!data) return;
    const board = data.board || Array(9).fill('');
    const turn  = data.turn  || 'X';
    const players = data.players || {};
    scores = data.scores || { X: 0, O: 0 };

    scoreXEl.textContent = `${players.X || 'X'}: ${scores.X}`;
    scoreOEl.textContent = `${players.O || 'O'}: ${scores.O}`;

    if (data.status === 'waiting' && !players.O) statusEl.textContent = `Sala ${roomId} — esperando oponente…`;
    else if (mySymbol) statusEl.textContent = `Sala ${roomId} — jugás como ${mySymbol}`;

    let winCells = [];
    for (const combo of WINS) {
      if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[1]] === board[combo[2]]) { winCells = combo; break; }
    }

    cells().forEach((cell, i) => {
      cell.textContent = board[i] === 'X' ? '✕' : board[i] === 'O' ? '○' : '';
      cell.classList.toggle('taken', !!board[i]);
      cell.classList.toggle('win', winCells.includes(i));
    });

    if (data.status === 'won') {
      const winName = players[data.winner] || data.winner;
      showModal(data.winner === mySymbol ? '🎀' : '💔', data.winner === mySymbol ? `¡Ganaste, ${myName}!` : `Ganó ${winName}`);
      turnEl.textContent = '';
    } else if (data.status === 'draw') {
      showModal('🤝', '¡Empate!'); turnEl.textContent = '';
    } else {
      overlay.classList.remove('show');
      turnEl.textContent = turn === mySymbol ? 'Tu turno ✨' : `Turno de ${players[turn] || turn}`;
    }
  }

  async function handleClick(i) {
    if (!roomId || !mySymbol) return;
    const snap = await new Promise(res => onValue(ref(db, `rooms/${roomId}`), res, { onlyOnce: true }));
    const data = snap.val(); if (!data) return;
    const board = data.board || Array(9).fill('');
    if ((data.status !== 'playing' && data.status !== 'waiting') || (data.status === 'waiting' && !data.players?.O)) return;
    if (data.turn !== mySymbol || board[i]) return;
    board[i] = mySymbol;
    const nextTurn = mySymbol === 'X' ? 'O' : 'X';
    let winner = null;
    for (const combo of WINS) {
      if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[1]] === board[combo[2]]) { winner = board[combo[0]]; break; }
    }
    const draw = !winner && board.every(c => c);
    const newScores = { ...scores };
    if (winner) newScores[winner] = (newScores[winner] || 0) + 1;
    await update(ref(db, `rooms/${roomId}`), { board, turn: nextTurn, status: winner ? 'won' : draw ? 'draw' : 'playing', winner: winner || null, scores: newScores });
  }

  async function restartBoard() {
    if (!roomId) return;
    overlay.classList.remove('show');
    await update(ref(db, `rooms/${roomId}`), { board: Array(9).fill(''), turn: 'X', status: 'playing', winner: null });
  }
  async function newGame() {
    if (!roomId) return;
    overlay.classList.remove('show');
    await update(ref(db, `rooms/${roomId}`), { board: Array(9).fill(''), turn: 'X', status: 'playing', winner: null, scores: { X: 0, O: 0 } });
  }

  document.getElementById('restartBtn').onclick  = restartBoard;
  document.getElementById('newGameBtn').onclick   = newGame;
  document.getElementById('modalRestart').onclick = restartBoard;
  document.getElementById('modalNew').onclick     = newGame;

  function showModal(emoji, title) {
    modalEmoji.textContent = emoji;
    modalTitle.textContent = title;
    overlay.classList.add('show');
  }

  // ── Lazos estilo acuarela en SVG ──────────────────────
  function makeBowSVG(color, opacity) {
    return `<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="${color}" stroke-linecap="round" stroke-linejoin="round" opacity="${opacity}">
        <!-- ala izquierda -->
        <path d="M58 44 C48 36 28 28 18 32 C10 36 12 46 20 50 C30 55 50 50 58 44Z"
              fill="${color}" stroke="none" opacity="0.9"/>
        <path d="M58 44 C50 40 34 34 22 36 C15 38 16 45 23 48 C34 52 50 48 58 44"
              fill="${color}" stroke="none" opacity="0.4"/>
        <!-- ala derecha -->
        <path d="M62 44 C72 36 92 28 102 32 C110 36 108 46 100 50 C90 55 70 50 62 44Z"
              fill="${color}" stroke="none" opacity="0.9"/>
        <path d="M62 44 C70 40 86 34 98 36 C105 38 104 45 97 48 C86 52 70 48 62 44"
              fill="${color}" stroke="none" opacity="0.4"/>
        <!-- nudo central -->
        <ellipse cx="60" cy="44" rx="7" ry="6" fill="${color}" opacity="1"/>
        <ellipse cx="60" cy="44" rx="4" ry="3.5" fill="${color}" opacity="0.5"/>
        <!-- cinta izquierda que cae -->
        <path d="M55 50 C50 58 44 66 40 76 C38 82 42 86 44 84"
              stroke="${color}" stroke-width="4" fill="none" opacity="0.85"/>
        <path d="M55 50 C51 57 46 64 43 73 C41 79 44 83 46 81"
              stroke="${color}" stroke-width="2" fill="none" opacity="0.4"/>
        <!-- cinta derecha que cae -->
        <path d="M65 50 C70 58 76 66 80 76 C82 82 78 86 76 84"
              stroke="${color}" stroke-width="4" fill="none" opacity="0.85"/>
        <path d="M65 50 C69 57 74 64 77 73 C79 79 76 83 74 81"
              stroke="${color}" stroke-width="2" fill="none" opacity="0.4"/>
      </g>
    </svg>`;
  }

  const layer = document.getElementById('bowsLayer');
  const pinks = ['#f4a7c0','#f48fb1','#f06292','#e8a0bf','#fad4e4','#e991b5'];

  for (let i = 0; i < 16; i++) {
    const div   = document.createElement('div');
    div.className = 'bow';
    const size  = 55 + Math.random() * 75;
    const color = pinks[Math.floor(Math.random() * pinks.length)];
    const op    = 0.45 + Math.random() * 0.3;
    const left  = Math.random() * 100;
    const dur   = 12 + Math.random() * 14;
    const delay = -(Math.random() * dur);

    div.style.cssText = `left:${left}%;width:${size}px;height:${size*0.75}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
    div.innerHTML = makeBowSVG(color, op);
    layer.appendChild(div);
  }
</script>
</body>
</html>
